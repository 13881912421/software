name: OpenAPI Auto Generate & Validate
on:
  push:
    paths: ["book.yaml"] # 仅契约变更时触发

permissions:
  contents: write

jobs:
  validate-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 修复1：获取完整历史，确保 git push 正常

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # 修复2：添加 Maven 缓存，大幅加速构建

      - name: 下载OpenAPI Generator
        run: curl -o openapi-generator-cli.jar https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.8.0/openapi-generator-cli-7.8.0.jar

      - name: 校验API契约合法性
        run: java -jar openapi-generator-cli.jar validate -i book.yaml

      # 修复3：修正了 YAML 换行语法错误，去掉了多余的 --
      - name: 重新生成Spring代码
        run: |
          java -jar openapi-generator-cli.jar generate \
            -g spring \
            -i book.yaml \
            -o ./book-server \
            --api-package org.openapitools.api \
            --model-package org.openapitools.model \
            --additional-properties=groupId=com.example,artifactId=bookstore,packageName=com.example.bookstore,javaVersion=17

      - name: 编译&测试生成代码
        run: cd ./book-server && mvn clean package -DskipTests

      # 修复4：增加判断，只有代码真的变了才提交，防止报错
      - name: 自动提交生成代码
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ./book-server/src/main/java/org/openapitools/
          git add ./book-server/src/main/resources/openapi.yaml
          git diff-index --quiet HEAD || (git commit -m "chore: auto-generate code for book.yaml update" && git push)